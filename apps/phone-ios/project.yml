name: SplicePhone
options:
  bundleIdPrefix: com.compassbox
  deploymentTarget:
    iOS: "17.0"
packages:
  ConnectIQ:
    url: https://github.com/garmin/connectiq-companion-app-sdk-ios.git
    from: 1.8.0
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: 2.29.0
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
targets:
  SplicePhone:
    type: application
    platform: iOS
    sources:
      - path: SplicePhone
        excludes:
          - Tests/**
          - Config/SpliceSecrets.example.plist
    resources:
      - path: SplicePhone/Config
        includes:
          - SpliceSecrets.plist
        optional: true
    dependencies:
      - package: ConnectIQ
        product: ConnectIQ
      - package: Supabase
        product: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.compassbox.splicephone
        INFOPLIST_KEY_CFBundleDisplayName: Splice
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: SplicePhone/Info.plist
      properties:
        CFBundleDisplayName: Splice
        UILaunchScreen: {}
        CFBundleURLTypes:
          - CFBundleURLName: com.compassbox.splicephone.ciq
            CFBundleURLSchemes:
              - splicephone-ciq
        LSApplicationQueriesSchemes:
          - gcm-ciq
        NSBluetoothAlwaysUsageDescription: Splice uses Bluetooth to send compass data to your Garmin watch via the Connect IQ Mobile SDK.
        UIBackgroundModes:
          - bluetooth-central
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
  SplicePhoneTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SplicePhone/Tests
    dependencies:
      - target: SplicePhone
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.compassbox.splicephone.tests
